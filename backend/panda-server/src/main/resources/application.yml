spring:
  application:
    name: panda-server
  profiles:
    active: dev

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.panda.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 604800
  active-timeout: 1800
  is-concurrent: false
  is-share: false
  is-read-header: true
  is-read-cookie: false
  is-read-body: false
  is-log: true

server:
  port: 8080

panda:
  amap:
    key: 41c02ed4a74387d6fe95299cb7adb8f4
    secret: b1a8779ea28e6241db16882c059e9233
  mqtt:
    enabled: ${PANDA_MQTT_ENABLED:false}
    server-uri: ${PANDA_MQTT_SERVER_URI:tcp://172.20.10.2:1883}
    client-id: ${PANDA_MQTT_CLIENT_ID:panda-server}
    username: ${PANDA_MQTT_USERNAME:}
    password: ${PANDA_MQTT_PASSWORD:}
    qos: ${PANDA_MQTT_QOS:1}
    telemetry-topic: ${PANDA_MQTT_TELEMETRY_TOPIC:panda/scooter/+/telemetry}
    ack-topic: ${PANDA_MQTT_ACK_TOPIC:panda/scooter/+/ack}
    command-topic-prefix: ${PANDA_MQTT_COMMAND_TOPIC_PREFIX:panda/scooter}
    command-ack-timeout-seconds: ${PANDA_MQTT_COMMAND_ACK_TIMEOUT_SECONDS:10}
    command-retry-scan-delay-seconds: ${PANDA_MQTT_COMMAND_RETRY_SCAN_DELAY_SECONDS:60}
    command-retry-batch-size: ${PANDA_MQTT_COMMAND_RETRY_BATCH_SIZE:50}
    command-max-retry-count: ${PANDA_MQTT_COMMAND_MAX_RETRY_COUNT:3}
    scooter-online-ttl-seconds: ${PANDA_MQTT_SCOOTER_ONLINE_TTL_SECONDS:60}
